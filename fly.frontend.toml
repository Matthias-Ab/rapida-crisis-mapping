# Fly.io app configuration for RAPIDA frontend
app = "rapida-crisis-mapping-frontend"
primary_region = "ams"

[build]
  dockerfile = "docker/Dockerfile.frontend"
  [build.args]
    VITE_API_BASE_URL = "https://rapida-crisis-mapping.fly.dev/api/v1"
    VITE_ENABLE_AI = "true"
    VITE_MINIO_PUBLIC_URL = "https://rapida-minio.fly.dev"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
